name: generate arcade contribution graphs

on:
    schedule: # Jalankan otomatis setiap 24 jam
        - cron: '0 0 * * *'
    workflow_dispatch: # Bisa dijalankan manual
    push: # Jalankan setiap push ke branch main
        branches:
            - main

jobs:
    generate:
        permissions:
            contents: write
        runs-on: ubuntu-latest
        timeout-minutes: 20

        steps:
            - name: generate contribution graph SVGs
              uses: abozanona/pacman-contribution-graph@main
              with:
                  github_user_name: ${{ github.repository_owner }}
                  games: 'pacman'

            # Push SVG yang dihasilkan ke branch output
            - name: push SVGs to the output branch
              uses: crazy-max/ghaction-github-pages@v3.1.0
              with:
                  target_branch: output
                  build_dir: dist
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
